<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Dashboard — Kinetra AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>

:root {
  --bg:           #090D18;
  --surface:      #10141F;
  --surface-2:    #141926;
  --surface-deep: #0D1117;
  --border:       #1C2333;
  --border-2:     #2A3347;
  --text:         #E8EEFF;
  --text-sub:     #BDC7E0;
  --muted:        #8892AA;
  --dim:          #4E5A72;
  --accent:       #8B5CF6;
  --accent-2:     #6366F1;
  --accent-dim:   rgba(139, 92, 246, 0.08);
  --accent-br:    rgba(139, 92, 246, 0.22);
  --accent-grad:  linear-gradient(135deg, #6366F1 0%, #8B5CF6 100%);
  --live:         #10B981;
  --live-dim:     rgba(16, 185, 129, 0.1);
  --live-br:      rgba(16, 185, 129, 0.25);
  --warning:      #F59E0B;
  --warning-dim:  rgba(245, 158, 11, 0.1);
  --error:        #F87171;
  --error-dim:    rgba(248, 113, 113, 0.1);
  --idle:         #374151;
  --sidebar-w:    200px;
  --header-h:     52px;
  --radius-sm:    4px;
  --radius:       6px;
  --radius-md:    8px;
  --radius-lg:    10px;
  --font-ui:      'Inter', system-ui, sans-serif;
  --font-mono:    'JetBrains Mono', monospace;
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; font-size: 16px; }
body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-ui);
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}
a { text-decoration: none; color: inherit; }
button { cursor: pointer; font-family: inherit; border: none; background: none; }

.shell {
  display: grid;
  grid-template-columns: var(--sidebar-w) 1fr;
  grid-template-rows: var(--header-h) 1fr;
  height: 100vh;
  overflow: hidden;
}

.sidebar {
  grid-column: 1;
  grid-row: 1 / 3;
  background: var(--surface-deep);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  overflow-x: hidden;
}
.sidebar-brand {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.sidebar-brand img { height: 28px; width: auto; }
.sidebar-brand-text { display: flex; flex-direction: column; }
.sidebar-brand-name { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.2; }
.sidebar-brand-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
.sidebar-nav { flex: 1; padding: 8px 0; }
.nav-section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: var(--dim); padding: 12px 16px 4px; }
.nav-link { display: flex; align-items: center; gap: 10px; padding: 8px 16px; font-size: 13px; font-weight: 500; color: var(--muted); border-radius: 0; transition: background 0.15s, color 0.15s; cursor: pointer; position: relative; }
.nav-link:hover { background: rgba(255,255,255,0.04); color: var(--text-sub); }
.nav-link.active { background: var(--accent-dim); color: var(--text); }
.nav-link.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background: var(--accent-grad); border-radius: 0 2px 2px 0; }
.nav-link svg { flex-shrink: 0; width: 16px; height: 16px; opacity: 0.7; }
.nav-link.active svg { opacity: 1; }
.nav-badge { margin-left: auto; font-size: 10px; font-weight: 600; font-family: var(--font-mono); background: var(--accent-dim); color: var(--accent); border: 1px solid var(--accent-br); border-radius: var(--radius-sm); padding: 1px 5px; }
.nav-badge.warn { background: var(--warning-dim); color: var(--warning); border-color: rgba(245,158,11,0.3); }
.sidebar-footer { padding: 12px 16px; border-top: 1px solid var(--border); flex-shrink: 0; }
.powered-by { font-size: 10px; color: var(--dim); letter-spacing: 0.04em; }
.powered-by span { background: var(--accent-grad); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; font-weight: 600; }

.header { grid-column: 2; grid-row: 1; background: var(--surface-deep); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 24px; gap: 16px; }
.header-title-wrap { flex: 1; }
.header-title { font-size: 14px; font-weight: 600; color: var(--text); }
.header-breadcrumb { font-size: 11px; color: var(--dim); margin-top: 1px; }
.header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
.status-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.status-dot.live { background: var(--live); box-shadow: 0 0 0 2px var(--live-dim); animation: pulse 2s infinite; }
.status-dot.warning { background: var(--warning); }
.status-dot.error   { background: var(--error); }
.status-dot.idle    { background: var(--idle); }
@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
.header-clock { font-size: 12px; font-family: var(--font-mono); color: var(--muted); min-width: 60px; text-align: right; }
.header-divider { width: 1px; height: 20px; background: var(--border); }
.header-user { display: flex; align-items: center; gap: 8px; padding: 4px 8px; border-radius: var(--radius); cursor: pointer; transition: background 0.15s; }
.header-user:hover { background: rgba(255,255,255,0.04); }
.user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-grad); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: #fff; flex-shrink: 0; }
.user-name { font-size: 12px; font-weight: 500; color: var(--text-sub); }
.header-btn { display: flex; align-items: center; gap: 6px; padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--muted); border: 1px solid var(--border); border-radius: var(--radius); background: transparent; transition: border-color 0.15s, color 0.15s; }
.header-btn:hover { border-color: var(--border-2); color: var(--text-sub); }

.main { grid-column: 2; grid-row: 2; overflow-y: auto; overflow-x: hidden; }
.page { display: none; padding: 24px; min-height: 100%; }
.page.active { display: block; }

.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; transition: border-color 0.15s; }
.kpi-card:hover { border-color: var(--border-2); }
.kpi-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); margin-bottom: 10px; }
.kpi-value { font-size: 32px; font-weight: 600; font-family: var(--font-mono); color: var(--text); line-height: 1; letter-spacing: -0.02em; }
.kpi-value.live-val { color: var(--live); }
.kpi-value.error-val { color: var(--error); }
.kpi-delta { font-size: 12px; font-family: var(--font-mono); margin-top: 6px; color: var(--muted); }
.kpi-delta .up   { color: var(--live); }
.kpi-delta .down { color: var(--error); }

.content-row { display: grid; grid-template-columns: 1fr 320px; gap: 16px; margin-bottom: 24px; }
.content-row.full { grid-template-columns: 1fr; }

.panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; }
.panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 1px solid var(--border); }
.panel-title { font-size: 13px; font-weight: 600; color: var(--text); }
.panel-meta { font-size: 11px; color: var(--dim); }
.panel-body { padding: 16px 20px; }

.chart-wrap { position: relative; height: 180px; display: flex; align-items: center; justify-content: center; }
.chart-canvas { width: 100%; height: 100%; display: block; }
.chart-empty { text-align: center; }
.chart-empty-icon { width: 40px; height: 40px; margin: 0 auto 10px; opacity: 0.2; }
.chart-empty-text { font-size: 13px; color: var(--dim); }
.chart-empty-sub { font-size: 11px; color: var(--dim); margin-top: 3px; opacity: 0.7; }

.table-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.table-tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--muted); border-bottom: 2px solid transparent; cursor: pointer; transition: color 0.15s, border-color 0.15s; background: none; }
.table-tab:hover { color: var(--text-sub); }
.table-tab.active { color: var(--text); border-bottom-color: var(--accent); }

.table-filter { display: flex; align-items: center; gap: 8px; padding: 8px 16px; border-bottom: 1px solid var(--border); background: var(--surface-2); }
.filter-input { flex: 1; font-size: 12px; font-family: var(--font-ui); color: var(--text); background: var(--surface-deep); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 10px; outline: none; transition: border-color 0.15s; }
.filter-input::placeholder { color: var(--dim); }
.filter-input:focus { border-color: var(--accent-br); }
.filter-label { font-size: 11px; color: var(--dim); }

.data-table { width: 100%; border-collapse: collapse; }
.data-table th { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--dim); padding: 8px 16px; text-align: left; border-bottom: 1px solid var(--border); background: var(--surface-2); }
.data-table td { font-size: 12px; color: var(--text-sub); padding: 9px 16px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.data-table tr:last-child td { border-bottom: none; }
.data-table tr:nth-child(even) td { background: rgba(255,255,255,0.01); }
.data-table .mono { font-family: var(--font-mono); font-size: 11px; }
.data-table .empty-row td { text-align: center; color: var(--dim); padding: 24px; font-style: italic; }

.tag { display: inline-flex; align-items: center; gap: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; border-radius: var(--radius-sm); padding: 2px 6px; }
.tag.live    { background: var(--live-dim); color: var(--live); border: 1px solid var(--live-br); }
.tag.warn    { background: var(--warning-dim); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
.tag.error   { background: var(--error-dim); color: var(--error); border: 1px solid rgba(248,113,113,0.3); }
.tag.neutral { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid var(--border); }

.health-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.health-row:last-child { border-bottom: none; }
.health-name { font-size: 12px; color: var(--text-sub); display: flex; align-items: center; gap: 7px; }
.health-val { font-size: 12px; font-family: var(--font-mono); color: var(--muted); }

.coverage-item { margin-bottom: 12px; }
.coverage-item:last-child { margin-bottom: 0; }
.coverage-header { display: flex; justify-content: space-between; margin-bottom: 5px; }
.coverage-name { font-size: 12px; color: var(--text-sub); }
.coverage-pct { font-size: 12px; font-family: var(--font-mono); color: var(--muted); }
.coverage-bar { height: 4px; background: var(--surface-deep); border-radius: 2px; overflow: hidden; }
.coverage-fill { height: 100%; background: var(--accent-grad); border-radius: 2px; transition: width 0.6s ease; }
.coverage-fill.warn { background: var(--warning); }

.log-wrap { font-family: var(--font-mono); font-size: 11px; line-height: 1.7; max-height: 140px; overflow-y: auto; }
.log-wrap::-webkit-scrollbar { width: 4px; }
.log-wrap::-webkit-scrollbar-track { background: transparent; }
.log-wrap::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 2px; }
.log-line { display: flex; gap: 8px; color: var(--muted); padding: 1px 0; }
.log-time { color: var(--dim); flex-shrink: 0; min-width: 52px; }
.log-level-ok   { color: var(--live); }
.log-level-warn { color: var(--warning); }
.log-level-err  { color: var(--error); }
.log-msg        { color: var(--text-sub); }
.log-empty { font-size: 11px; color: var(--dim); padding: 12px 0; text-align: center; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 320px; text-align: center; }
.empty-state-icon { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.18; }
.empty-state-title { font-size: 15px; font-weight: 600; color: var(--text-sub); margin-bottom: 6px; }
.empty-state-sub { font-size: 13px; color: var(--dim); max-width: 280px; line-height: 1.6; }

.main::-webkit-scrollbar { width: 5px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 3px; }

</style>
</head>

<script>
(function applyWhiteLabel() {
  const cfg = CLIENT_CONFIG;
  const root = document.documentElement;
  if (cfg.accent_color) {
    root.style.setProperty('--accent', cfg.accent_color);
    const hex = cfg.accent_color.replace('#', '');
    const r = parseInt(hex.slice(0,2),16), g = parseInt(hex.slice(2,4),16), b = parseInt(hex.slice(4,6),16);
    root.style.setProperty('--accent-dim', `rgba(${r},${g},${b},0.08)`);
    root.style.setProperty('--accent-br',  `rgba(${r},${g},${b},0.22)`);
    const c2 = cfg.accent_color2 || cfg.accent_color;
    root.style.setProperty('--accent-grad', `linear-gradient(135deg, ${cfg.accent_color} 0%, ${c2} 100%)`);
  }
  const nameEl = document.getElementById('sidebar-client-name');
  if (nameEl) nameEl.textContent = cfg.client_name || 'Client Portal';
  document.title = `Dashboard — ${cfg.client_name || 'Kinetra AI'}`;
  const avatarEl = document.getElementById('user-avatar');
  const nameSpan = document.getElementById('user-name');
  if (avatarEl) avatarEl.textContent = cfg.user_initials || 'A';
  if (nameSpan) nameSpan.textContent = cfg.user_name || 'Admin';
  const footer = document.getElementById('powered-by-footer');
  if (footer && !cfg.powered_by) footer.style.display = 'none';
})();

const PAGE_TITLES = {
  overview:     ['Dashboard',     CLIENT_CONFIG.client_name],
  activity:     ['Activity',      'Event history'],
  workflows:    ['Workflows',     'Automation engine'],
  models:       ['AI Models',     'Model registry'],
  integrations: ['Integrations',  'Connected services'],
  reports:      ['Reports',       'Analytics & exports'],
  logs:         ['Logs',          'System log stream'],
  settings:     ['Settings',      'Configuration'],
};

function navigate(pageId) {
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const link = document.querySelector(`.nav-link[data-page="${pageId}"]`);
  const page = document.getElementById(`page-${pageId}`);
  if (link) link.classList.add('active');
  if (page) page.classList.add('active');
  const titles = PAGE_TITLES[pageId] || [pageId, ''];
  const titleEl = document.getElementById('header-page-title');
  const crumbEl = document.getElementById('header-breadcrumb');
  if (titleEl) titleEl.textContent = titles[0];
  if (crumbEl) crumbEl.textContent = titles[1] || '';
}

document.querySelectorAll('.nav-link[data-page]').forEach(link => {
  link.addEventListener('click', () => navigate(link.dataset.page));
});

function updateClock() {
  const el = document.getElementById('header-clock');
  if (!el) return;
  el.textContent = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: false });
}
updateClock();
setInterval(updateClock, 1000);

document.querySelectorAll('.table-tab').forEach(tab => {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.table-tab').forEach(t => t.classList.remove('active'));
    this.classList.add('active');
  });
});

document.getElementById('refresh-btn').addEventListener('click', function() {
  const svg = this.querySelector('svg');
  if (svg) {
    svg.style.transition = 'transform 0.5s ease';
    svg.style.transform = 'rotate(360deg)';
    setTimeout(() => { svg.style.transition = ''; svg.style.transform = ''; }, 500);
  }
});
<\/script>

</body>
